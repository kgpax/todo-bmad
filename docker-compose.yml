# Explicit project name pins the volume name (todo-bmad_todo-data) regardless
# of the directory name the repo is cloned into, preventing accidental data loss.
name: todo-bmad

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      # Absolute path required — a relative path resolves from WORKDIR (/app)
      # to /app/data/todos.db, which is outside the volume mount point and
      # causes silent data loss on container restart.
      DATABASE_PATH: /app/packages/backend/data/todos.db
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      NODE_ENV: production
    volumes:
      - todo-data:/app/packages/backend/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3001/api/todos"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    # tini as PID 1 for proper signal forwarding (SIGTERM/SIGINT) and
    # zombie process reaping — ensures graceful shutdown on docker compose down.
    init: true
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Internal Docker network hostname for SSR fetches from the Node.js server
      API_URL: http://backend:3001
      # Next.js standalone server checks HOSTNAME to set its listen address.
      # Without this, it binds to localhost inside the container (loopback only),
      # which is unreachable from the host through Docker port mapping.
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    init: true
    restart: unless-stopped

volumes:
  todo-data:
